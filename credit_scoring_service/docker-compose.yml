version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: credit_scoring_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: credit_scoring_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d credit_scoring_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (rate-limiting & caching backend) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: credit_scoring_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── FastAPI Microservice ─────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit_scoring_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "CredAI Credit Scoring"
      APP_VERSION: "1.0.0"
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql://postgres:password@db:5432/credit_scoring_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      RATE_LIMIT: "100/minute"
      MODEL_PATH: app/ml/model.pkl
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app/ml:/app/app/ml
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3

  # ── React Frontend (Vite dev server — swap for nginx in prod) ────────────────
  frontend:
    image: node:20-alpine
    container_name: credit_scoring_frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://api:8000/v1
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
