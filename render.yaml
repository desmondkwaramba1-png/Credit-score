databases:
  - name: credit-scoring-db
    databaseName: credit_scoring_db
    user: pamoja_db_user
    plan: free

services:
  # ── Redis (Rate Limiting) ────────────────────────────────────────────────────
  - type: keyvalue
    name: credit-scoring-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: credit-scoring-api
    runtime: docker
    rootDir: credit_scoring_service
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: credit-scoring-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: credit-scoring-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"
      - key: MODEL_PATH
        value: app/ml/model.pkl

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: credit-scoring-frontend
    runtime: static
    rootDir: credit_scoring_service/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        # We use the predictable Render URL since 'property: url' is not supported in blueprints
        value: https://credit-scoring-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
