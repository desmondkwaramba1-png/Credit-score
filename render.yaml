# Render Blueprint for PAMOJA AI
services:
  # Backend FastAPI service
  - type: web
    name: pamoja-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pamoja-db
          property: connectionString
      - key: DEMO_API_KEY
        value: pk_demo_zw_pamoja2026
      - key: LIVE_API_KEY
        generateValue: true
      - key: MODEL_DIR
        value: ./models

  # Frontend Next.js service
  - type: web
    name: pamoja-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: pamoja-backend
          property: host

databases:
  - name: pamoja-db
    plan: free
