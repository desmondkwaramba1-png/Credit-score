services:
  - type: web
    name: pamoja-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pamoja-db
          property: connectionString
      - key: DEMO_API_KEY
        sync: false
      - key: LIVE_API_KEY
        sync: false

databases:
  - name: pamoja-db
    databaseName: pamoja
    user: pamoja
    plan: free
